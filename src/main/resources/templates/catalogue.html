<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Catalogue</title></head>
<body>
<main layout:fragment="content">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold mb-1">Catalogue des cours</h1>
            <p class="text-muted mb-0"
               th:text="${coursPage.totalElements} + ' cours disponibles'"></p>
        </div>
    </div>

    <!-- FILTRES -->
    <div class="filter-bar">
        <form th:action="@{/catalogue}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-semibold small">Rechercher</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" name="titre" class="form-control"
                           placeholder="Titre du cours..." th:value="${titre}">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold small">Catégorie</label>
                <select name="categorie" class="form-select">
                    <option value="">Toutes les catégories</option>
                    <option th:each="cat : ${categories}" th:value="${cat}"
                            th:text="${cat}" th:selected="${cat == categorie}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold small">Niveau</label>
                <select name="niveau" class="form-select">
                    <option value="">Tous les niveaux</option>
                    <option th:each="niv : ${niveaux}" th:value="${niv}"
                            th:text="${niv}" th:selected="${niv.name() == niveau}"></option>
                </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-funnel me-1"></i>Filtrer
                </button>
                <a th:href="@{/catalogue}" class="btn btn-outline-secondary">
                    <i class="bi bi-x"></i>
                </a>
            </div>
        </form>
    </div>

    <!-- LISTE COURS -->
    <div th:if="${coursPage.empty}" class="text-center py-5">
        <div style="font-size:4rem">📭</div>
        <h4 class="text-muted mt-3">Aucun cours trouvé</h4>
        <a th:href="@{/catalogue}" class="btn btn-primary mt-2">Réinitialiser les filtres</a>
    </div>

    <div class="row g-4" th:unless="${coursPage.empty}">
        <div th:each="cours : ${coursPage.content}" class="col-md-4">
            <div class="card h-100">
                <div class="position-relative">
                    <img th:if="${cours.imageUrl}"
                         th:src="@{/uploads/} + ${cours.imageUrl}"
                         class="card-img-top" th:alt="${cours.titre}">
                    <img th:unless="${cours.imageUrl}"
                         src="https://via.placeholder.com/400x200/4f46e5/ffffff?text=Cours"
                         class="card-img-top" th:alt="${cours.titre}">
                    <span class="badge position-absolute top-0 end-0 m-2"
                          th:classappend="${cours.niveau?.name() == 'DEBUTANT' ? 'badge-debutant' :
                                          (cours.niveau?.name() == 'INTERMEDIAIRE' ? 'badge-intermediaire' : 'badge-avance')}"
                          th:text="${cours.niveau}"></span>
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="badge bg-light text-dark" th:text="${cours.categorie}"></span>
                        <div class="text-warning d-flex align-items-center gap-1">
                            <i class="bi bi-star-fill small"></i>
                            <small th:text="${#numbers.formatDecimal(cours.noteMoyenne, 1, 1)}"></small>
                        </div>
                    </div>
                    <h5 class="card-title fw-bold" th:text="${cours.titre}"></h5>
                    <p class="card-text text-muted small"
                       th:text="${#strings.abbreviate(cours.description, 100)}"></p>
                    <div class="text-muted small mt-2">
                        <i class="bi bi-people me-1"></i>
                        <span th:text="${cours.nombreInscrits}"></span> inscrits
                        <span class="mx-2">·</span>
                        <i class="bi bi-person me-1"></i>
                        <span th:text="${cours.formateur.nomComplet}"></span>
                    </div>
                </div>
                <div class="card-footer bg-transparent">
                    <a th:href="@{/cours/{id}/detail(id=${cours.id})}"
                       class="btn btn-primary w-100">
                        <i class="bi bi-eye me-1"></i>Voir le cours
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGINATION -->
    <nav th:if="${coursPage.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${coursPage.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/catalogue(page=${coursPage.number - 1},
                    titre=${titre}, categorie=${categorie}, niveau=${niveau})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, coursPage.totalPages - 1)}"
                class="page-item" th:classappend="${i == coursPage.number ? 'active' : ''}">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/catalogue(page=${i}, titre=${titre},
                       categorie=${categorie}, niveau=${niveau})}"></a>
            </li>
            <li class="page-item" th:classappend="${coursPage.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/catalogue(page=${coursPage.number + 1},
                    titre=${titre}, categorie=${categorie}, niveau=${niveau})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</div>
</main>
</body>
</html>
